<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Copilot Agent</title>
    <style>
      :root {
        --bg: #f5f3ef;
        --panel: #fffdf8;
        --ink: #1e1a17;
        --muted: #5f564e;
        --accent: #0f766e;
        --accent-soft: #c8ebe6;
        --danger: #b42318;
        --border: #ddd2c6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 0%, #fff4cf, transparent 45%),
          radial-gradient(circle at 90% 100%, #d7efe7, transparent 50%),
          var(--bg);
      }

      .layout {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
      }

      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(30, 26, 23, 0.08);
      }

      .editor-panel {
        padding: 16px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .title {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.3px;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      #editor {
        height: 520px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .side-panel {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .controls {
        display: grid;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        padding: 10px 12px;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(0.95);
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      .chip {
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #0d534e;
        font-size: 12px;
        width: fit-content;
      }

      #status {
        font-size: 13px;
        color: var(--muted);
      }

      #status.error {
        color: var(--danger);
      }

      #suggestions {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
        max-height: 360px;
        overflow: auto;
      }

      #suggestions li {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #fff;
        font-size: 13px;
      }

      #suggestions li.suggestion-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        cursor: pointer;
        transition: border-color 0.15s ease, transform 0.15s ease;
      }

      #suggestions li.suggestion-item:hover {
        border-color: #b8a893;
        transform: translateY(-1px);
      }

      #suggestions li.suggestion-item.top {
        border-color: rgba(15, 118, 110, 0.45);
        background: #f4fdfc;
      }

      .suggestion-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .suggestion-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
      }

      .source-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.3px;
        border-radius: 999px;
        padding: 2px 7px;
        border: 1px solid transparent;
        white-space: nowrap;
      }

      .source-badge.rule {
        color: #095a53;
        background: #dff7f2;
        border-color: #b2e8dd;
      }

      .source-badge.llm {
        color: #7b4601;
        background: #fff2de;
        border-color: #f1d2a4;
      }

      .shortcut-key {
        color: #6e655d;
        font-size: 11px;
        border: 1px solid #d9ccc0;
        border-radius: 999px;
        padding: 2px 8px;
        background: #fff8ef;
        white-space: nowrap;
      }

      .shortcut-hint {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        #editor {
          height: 420px;
        }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.7/require.min.js"></script>
  </head>
  <body>
    <div class="layout">
      <section class="panel editor-panel">
        <div class="header">
          <div>
            <h1 class="title">SQL Copilot Agent</h1>
            <p class="subtitle">Monaco + FastAPI + Schema-aware + Hybrid LLM autocomplete</p>
          </div>
          <span class="chip">MVP+AI</span>
        </div>
        <div id="editor"></div>
      </section>

      <aside class="panel side-panel">
        <div class="controls">
          <label class="toggle">
            <input id="use-llm" type="checkbox" checked />
            <span>Use LLM suggestions</span>
          </label>
          <button id="run-complete">Get Suggestions</button>
          <div id="status">Ready. Press Ctrl/Cmd + Space in editor.</div>
        </div>

        <div>
          <h3>Top Suggestions</h3>
          <p class="shortcut-hint">Rule 先返回，LLM 后补充；Tab 接受幽灵补全，Alt+1..9 选择建议</p>
          <ul id="suggestions"></ul>
        </div>
      </aside>
    </div>

    <script src="/monaco.js"></script>
  </body>
</html>
